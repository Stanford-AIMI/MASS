# Downstream segmentation finetuning example using a MASS/Iris checkpoint.

seed: 42
# Processed npy arrays use [D, H, W], so spacing is [z, y, x] in mm.
target_spacing: [1.5, 1.5, 1.5]

run:
  output_dir: runs/downstream/segmentation

data:
  train:
    type: FineTuningDataset
    data_root: ./data/mass_h5
    datasets: [bcv]
    mode: train
    training_size: [128, 128, 128]

  val:
    type: FineTuningDataset
    data_root: ./data/mass_h5
    datasets: [bcv]
    mode: test
    training_size: [128, 128, 128]

  loader:
    batch_size: 2
    num_workers: 8
    pin_memory: true
    persistent_workers: true
    drop_last: false

model:
  type: iris
  in_ch: 1
  channels: [32, 64, 128, 256, 512]
  scale: [2, 2, 2, 2]
  kernel_size: [3, 3, 3, 3, 3]
  block: BasicBlock
  num_block: [2, 2, 2, 2]
  pool: true
  norm: in
  tn: 73
  num_prior_stage: 3
  ema_moment: 0.99

trainer:
  type: finetuning

finetuning:
  pretrained_checkpoint: null
  use_ema_checkpoint: true
  mode: full
  num_classes: auto
  num_prior_stages: 3
  model_lr: 0.0005
  embedding_lr: 0.0005

epochs: 50
start_epoch: 0
# Number of optimization steps per epoch. A fixed default is useful for
# few-shot finetuning because each labeled volume can provide many random
# crops/augs. Set to null for exactly one pass over the training loader.
max_iter_per_epoch: 100
val_frequency: 1
print_freq: 10
log_freq: 20
checkpoint_freq_epoch: 25

optimizer:
  type: AdamW
  betas: [0.9, 0.999]
  weight_decay: 0.001

scheduler:
  type: CosineAnnealingLR
  T_max: 50
  eta_min: 0.000001

augmentation:
  affine_prob: 0.8
  scale: [0.3, 0.3, 0.3]
  rotate: [30, 30, 30]
  translate: [0, 0, 0]
  shear: [0.1, 0.1, 0.1]
  brightness_range: [0.8, 1.3]
  gamma_range: [0.7, 1.4]
  contrast_range: [0.7, 1.4]
  blur_range: [0.7, 1.3]
  gaussian_noise_std: 0.02

loss:
  dice:
    type: BinaryDiceLoss
    weight: 1.0
  bce:
    type: BinaryCrossEntropyLoss
    weight: 1.0

amp:
  enabled: true
  dtype: bfloat16

ema:
  enabled: true
  decay: 0.999
  prior_ema: true

evaluation:
  sliding_window: true
  window_size: [128, 128, 128]
  overlap: 0.5

distributed:
  backend: nccl
  master_addr: localhost
  master_port: 29523
